services:
  postgres:
    image: postgres:18
    container_name: xpm-job-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker_dev_password
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtracker -d jobtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: node:24-alpine
        DATABASE_URL: postgresql://jobtracker:jobtracker_dev_password@postgres:5432/jobtracker?schema=public
    container_name: xpm-job-tracker-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://jobtracker:jobtracker_dev_password@postgres:5432/jobtracker?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run serve"

volumes:
  postgres-data:


